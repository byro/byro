# Changelog-relevante Labels
- name: breaking-change
  color: 'b60205'
  description: Introduces breaking changes

- name: enhancement
  color: '0075ca'
  description: New feature or improvement

- name: bug
  color: 'd73a4a'
  description: Something isn't working

- name: fix
  color: 'e4e669'
  description: A fix for a bug or issue

- name: maintenance
  color: 'e4e669'
  description: Refactoring, CI, tooling, chores

- name: dependencies
  color: '0366d6'
  description: Dependency updates (Dependabot/Renovate)

- name: documentation
  color: '0075ca'
  description: Documentation changes

- name: skip-changelog
  color: 'eeeeee'
  description: Exclude this PR from release notes

# Workflow-Labels
- name: needs-review
  color: 'fbca04'
  description: Waiting for review

- name: work-in-progress
  color: 'ededed'
  description: Not ready to merge

- name: good first issue
  color: '7057ff'
  description: Good for newcomers

- name: help wanted
  color: '008672'
  description: Extra attention is needed

